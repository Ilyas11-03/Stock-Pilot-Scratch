version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alexsys-stage
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    networks:
      - app-network

  # Optional: Add monitoring/logging
  # Add additional services as needed (databases, cache, etc.)

networks:
  app-network:
    driver: bridge
